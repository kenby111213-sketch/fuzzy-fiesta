<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>☕ Quản lý quán cà phê</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <!-- Màn hình đăng nhập -->
    <div id="login-screen" class="login-screen hidden">
      <form class="login-box card" onsubmit="doLogin(event)">
        <div class="login-logo">☕</div>
        <h2>Quản lý quán cà phê</h2>
        <p class="muted">Đăng nhập để tiếp tục</p>
        <div class="field">
          <label>Tài khoản</label>
          <input id="login-user" autocomplete="username" placeholder="admin" />
        </div>
        <div class="field">
          <label>Mật khẩu</label>
          <input id="login-pass" type="password" autocomplete="current-password" placeholder="••••••" />
        </div>
        <div id="login-error" class="login-error"></div>
        <button class="btn btn-primary" style="width:100%" type="submit">Đăng nhập</button>
      </form>
    </div>

    <!-- Giao diện chính (ẩn tới khi đăng nhập) -->
    <div id="main-ui" class="hidden">
    <header class="topbar">
      <div class="brand">☕ <span>Quản lý quán</span></div>
      <nav class="tabs">
        <button class="tab active" data-view="pos">Bán hàng</button>
        <button class="tab" data-view="tables">Bàn</button>
        <button class="tab" data-view="menu">Thực đơn</button>
        <button class="tab" data-view="reports">Báo cáo</button>
      </nav>
      <div class="user-area">
        <span id="user-name" class="user-name"></span>
        <button class="btn btn-sm btn-ghost" onclick="openChangePassword()">Đổi mật khẩu</button>
        <button class="btn btn-sm btn-ghost" onclick="logout()">Đăng xuất</button>
      </div>
    </header>

    <main id="app"></main>
    </div>

    <!-- Vùng thông báo -->
    <div id="toast" class="toast"></div>

    <!-- Hộp thoại chung -->
    <div id="modal" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-head">
          <h3 id="modal-title">Tiêu đề</h3>
          <button class="icon-btn" onclick="closeModal()">✕</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
      </div>
    </div>

    <script src="/js/app.js"></script>
  </body>
</html>
